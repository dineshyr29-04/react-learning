<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Futuristic grid background -->
  <rect width="100" height="100" rx="20" fill="#18181b" stroke="#27272a" stroke-width="2"/>
  
  <!-- Atom orbits -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" transform="rotate(30 50 50)" opacity="0.6"/>
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" transform="rotate(90 50 50)" />
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" transform="rotate(150 50 50)" opacity="0.6"/>
  
  <!-- Nucleus -->
  <circle cx="50" cy="50" r="7" fill="url(#logo-grad)"/>
</svg>
